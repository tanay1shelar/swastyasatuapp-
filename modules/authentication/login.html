<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Healthcare & Medical Camp Management System</title>
    <meta name="description" content="Secure login to HMCMS. Manage health camps, patient records, and medical schedules.">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../../assets/../../assets/css/style.css?v=1.3" rel="stylesheet">
</head>
<body>
    <!-- Page Loading Animation -->
    <div class="page-loader">
        <div class="spinner-medical"></div>
    </div>

    <!-- Main Auth Container -->
    <div class="auth-wrapper">
        <!-- Left Side: Graphic & Branding -->
        <div class="auth-left">
            <div class="auth-left-content">
                <img src="../../assets/images/backgrounds/login-illustration.png" alt="Medical Camp illustration" class="auth-illustration">
                <h2 class="mb-3 text-primary">Healthcare & Medical Camp Management System</h2>
                <p class="text-muted fs-6 lh-lg">
                    Digitally managing healthcare services and medical camps with efficiency, security, and accessibility.
                </p>
            </div>
        </div>

        <!-- Right Side: Login Card -->
        <div class="auth-right">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <img src="../../assets/images/logo/logo.png" alt="HMCMS Logo" class="mb-3" style="height: 55px; width: auto;">
                    <h3 class="mb-1 text-dark">Welcome Back</h3>
                    <p class="text-muted font-size-sm">Sign in to continue.</p>
                </div>

                <!-- Form -->
                <form id="loginForm" novalidate>
                    <!-- Role Dropdown -->
                    <div class="mb-3">
                        <label for="role" class="form-label font-weight-500">Select Role</label>
                        <select class="form-select" id="role">
                            <option value="" selected disabled>-- Select Your Role --</option>
                            <option value="super-admin">Super Admin</option>
                            <option value="camp-admin">Medical Camp Admin</option>
                            <option value="doctor">Doctor</option>
                            <option value="health-worker">Health Worker</option>
                            <option value="citizen">Citizen / Patient</option>
                        </select>
                        <div class="error-message"></div>
                    </div>

                    <!-- Username / Email -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Username or Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="far fa-user"></i></span>
                            <input type="text" class="form-control" id="username" placeholder="Enter username or email" required>
                        </div>
                        <div class="error-message"></div>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label mb-0">Password</label>
                            <a href="forgot-password.php" class="small text-primary">Forgot Password?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message"></div>
                    </div>

                    <!-- Remember Me -->
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label text-muted" for="rememberMe">Remember Me</label>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn btn-primary w-100 py-2 fs-6 mb-3">
                        Sign In
                    </button>
                </form>

                <!-- Quick Demo Auto-Fill Buttons -->
                <div class="p-3 bg-light rounded border text-center mb-3">
                    <span class="fw-bold small text-muted d-block mb-2"><i class="fas fa-bolt text-warning me-1"></i> Quick Demo Logins (Click to Auto-Fill):</span>
                    <div class="d-flex flex-wrap justify-content-center gap-1">
                        <button type="button" class="btn btn-xs btn-outline-primary py-1 px-2 small" onclick="autoFillDemo('super-admin', 'admin@hmcms.org', 'password123')">Super Admin</button>
                        <button type="button" class="btn btn-xs btn-outline-primary py-1 px-2 small" onclick="autoFillDemo('camp-admin', 'camp@hmcms.org', 'password123')">Camp Admin</button>
                        <button type="button" class="btn btn-xs btn-outline-primary py-1 px-2 small" onclick="autoFillDemo('doctor', 'doctor@hmcms.org', 'password123')">Doctor</button>
                        <button type="button" class="btn btn-xs btn-outline-primary py-1 px-2 small" onclick="autoFillDemo('health-worker', 'worker@hmcms.org', 'password123')">Health Worker</button>
                        <button type="button" class="btn btn-xs btn-outline-primary py-1 px-2 small" onclick="autoFillDemo('citizen', 'citizen@hmcms.org', 'password123')">Citizen</button>
                    </div>
                </div>

                <!-- Auth Footer -->
                <div class="text-center mt-4 text-muted small">
                    <p class="mb-0">&copy; 2026 Healthcare & Medical Camp Management System</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1060;"></div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../../assets/../../assets/../../assets/js/validation.js"></script>
    <script>
        function autoFillDemo(role, username, password) {
            document.getElementById('role').value = role;
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }
    </script>
</body>
</html>
